services:
  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ayudas_app
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  db:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: ayudas_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ayudas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ayudas"]
      interval: 5s
      timeout: 5s
      retries: 10

  scheduler:
    image: alpine:3.20
    container_name: ayudas_scheduler
    env_file:
      - ./web/.env.local
    depends_on:
      - app
    command: >
      sh -c "
      apk add --no-cache curl tzdata &&
      ln -sf /usr/share/zoneinfo/$$TZ /etc/localtime &&
      echo \"$$TZ\" > /etc/timezone &&
      echo \"$$ALERTS_AUTORUN_CRON curl -sS -X POST -H 'x-alerts-secret: $$ALERTS_RUN_SECRET' $$APP_INTERNAL_URL/api/alerts/weekly/run >/proc/1/fd/1 2>/proc/1/fd/2\" > /etc/crontabs/root &&
      crond -f -l 8
      "

volumes:
  postgres_data: