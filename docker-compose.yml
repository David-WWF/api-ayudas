services:
  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ayudas_app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ayudas
      BDNS_SEARCH_ENDPOINT: https://www.pap.hacienda.gob.es/bdnstrans/api/convocatorias/busqueda
      BDNS_TIMEOUT_MS: "12000"
      BDNS_RETRIES: "2"
      BDNS_DEBUG_SAMPLE: "false"
      ALERTS_RUN_SECRET: "cambia-esto-por-un-secreto-largo"
      ALERTS_EMAIL_ENABLED: "false"
      ALERT_RECIPIENTS: "tu_correo@empresa.com,otro@empresa.com"
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: "alertas-ayudas@tu-dominio.com"
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  db:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: ayudas_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ayudas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ayudas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: